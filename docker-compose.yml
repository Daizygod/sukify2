services:
  # --------------------------------------------------------------------------
  # PHP-FPM application (Laravel)
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: sukify/app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sukify

  # --------------------------------------------------------------------------
  # Nginx — web entrypoint in front of php-fpm
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sukify

  # --------------------------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sukify}
      POSTGRES_USER: ${POSTGRES_USER:-sukify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sukify} -d ${POSTGRES_DB:-sukify}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sukify

  # --------------------------------------------------------------------------
  # Redis — cache, queues, sessions
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - sukify

  # --------------------------------------------------------------------------
  # Centrifugo — realtime websockets (device sync + Jam)
  # --------------------------------------------------------------------------
  centrifugo:
    image: centrifugo/centrifugo:v5
    restart: unless-stopped
    command: ["centrifugo", "-c", "config.json"]
    volumes:
      - ./docker/centrifugo/config.json:/centrifugo/config.json:ro
    ports:
      - "${CENTRIFUGO_PORT:-8000}:8000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - sukify

  # --------------------------------------------------------------------------
  # Meilisearch — search backend for Laravel Scout
  # --------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKeyChangeMe}
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    volumes:
      - meilidata:/meili_data
    networks:
      - sukify

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (dev)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sukify}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sukifysecret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sukify

  # Init container: creates the bucket on first boot, sets it public-read for dev.
  minio-createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-sukify} ${MINIO_ROOT_PASSWORD:-sukifysecret}) do echo 'waiting for minio...'; sleep 1; done;
      mc mb --ignore-existing local/${MINIO_BUCKET:-sukify};
      mc anonymous set download local/${MINIO_BUCKET:-sukify};
      echo 'bucket ready';
      exit 0;
      "
    networks:
      - sukify

  # --------------------------------------------------------------------------
  # Queue worker — processes audio/image/cleanup jobs
  # --------------------------------------------------------------------------
  queue-worker:
    image: sukify/app
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--max-time=3600", "--timeout=600"]
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - sukify

  # --------------------------------------------------------------------------
  # Scheduler — runs artisan schedule:work (cron: orphan cleanup, etc.)
  # --------------------------------------------------------------------------
  scheduler:
    image: sukify/app
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - sukify

  # --------------------------------------------------------------------------
  # Vite — frontend dev server (user-facing Vue 3 SPA)
  # --------------------------------------------------------------------------
  vite:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${VITE_PORT:-5173}:5173"
    networks:
      - sukify

networks:
  sukify:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  meilidata:
  backend_vendor:
  frontend_node_modules:
