# Прод: одна точка входа — собранная SPA + Laravel (API/админка) + Centrifugo WS.
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 520M;

    # Centrifugo: вебсокеты устройств/джемов.
    location /connection/websocket {
        proxy_pass http://centrifugo:8000/connection/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Laravel: API, Sanctum, админка, healthcheck.
    location ~ ^/(api|sanctum|admin|up)(/|$) {
        try_files $uri /index.php?$query_string;
    }

    # Ассеты админки (Inertia build) и публичные файлы Laravel.
    location /build/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /storage/ {
        expires 7d;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Собранная SPA (Vue): всё остальное, с fallback на index.html.
    location /assets/ {
        root /var/www/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /fonts/ {
        root /var/www/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location / {
        root /var/www/frontend;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
