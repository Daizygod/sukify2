; Application PHP overrides (loaded last)
memory_limit = 512M

; Audio/cover uploads can be large (FLAC/APE). Allow big uploads.
upload_max_filesize = 512M
post_max_size = 520M
max_file_uploads = 20

max_execution_time = 120
max_input_time = 120

; Timezone
date.timezone = UTC

; OPcache (dev-friendly: validate timestamps so code changes are picked up)
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000

; Show errors in dev (Laravel controls this too via APP_DEBUG)
display_errors = On
error_reporting = E_ALL
